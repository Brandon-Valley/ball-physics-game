<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no'><title>Ball Physics Game</title><style>*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#07111f;color:white;font-family:system-ui,Segoe UI,sans-serif;touch-action:none}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;left:10px;right:10px;top:max(10px,env(safe-area-inset-top));display:flex;gap:6px;flex-wrap:wrap;z-index:3;pointer-events:none}.hud div,button{background:#07111fcc;border:1px solid #ffffff26;border-radius:99px;padding:8px 10px;font-weight:800;font-size:12px;color:white;box-shadow:0 8px 24px #0007}button{pointer-events:auto}.menu{position:fixed;inset:0;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 20%,#67c7ff44,transparent 35%),#01050acc;z-index:5}.card{max-width:520px;border:1px solid #ffffff26;border-radius:28px;background:linear-gradient(#0d1c34,#050b15);padding:22px;box-shadow:0 24px 70px #000a}.card h1{font-size:clamp(40px,13vw,72px);line-height:.86;letter-spacing:-.08em;margin:0 0 12px}.card p{color:#a9bfd6;line-height:1.45}.big{width:100%;border:0;border-radius:18px;padding:15px;color:#03121d;background:linear-gradient(135deg,#67c7ff,#67f5c1);font-size:16px}.hide{display:none}</style></head><body><canvas id='c'></canvas><div class='hud'><div>Level <b id='lv'>1</b></div><div>Score <b id='sc'>0</b></div><div>Best <b id='bs'>0</b></div><div>Shards <b id='co'>0/0</b></div><div>Lives <b id='li'>3</b></div><button id='pa'>Pause</button><button id='re'>Restart</button></div><div id='m' class='menu'><div class='card'><h1>Neon Marble<br>Rush</h1><p>One-thumb physics arcade. Pull back, release, ricochet off blue bumpers, collect green shards, dodge red hazards, and dive into the portal.</p><button id='st' class='big'>Start Game</button></div></div><script>(()=>{let cv=c,ctx=cv.getContext('2d'),W,H,D,t=0,last=0,drag=null,stars=[],coins=[],bad=[],bum=[],bits=[],best=+localStorage.bpgBest||0,S={mode:0,pause:0,lv:1,sc:0,life:3,got:0,need:7,open:0},B={x:0,y:0,vx:0,vy:0,r:15,inv:0},G={x:0,y:0,r:34};function R(a,b){return a+Math.random()*(b-a)}function d(a,b,c,e){return Math.hypot(c-a,e-b)}function size(){D=Math.min(2.5,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*D;cv.height=H*D;ctx.setTransform(D,0,0,D,0,0);stars=Array.from({length:60},()=>({x:R(0,W),y:R(0,H),r:R(.4,1.8),a:R(.15,.6)}))}function arena(){let m=Math.max(16,Math.min(W,H)*.045),top=78;return{x:m,y:top,w:W-m*2,h:H-top-m}}function hud(){lv.textContent=S.lv;sc.textContent=S.sc|0;bs.textContent=Math.max(best,S.sc)|0;co.textContent=S.got+'/'+S.need;li.textContent=S.life}function reset(){let a=arena();B.x=a.x+a.w/2;B.y=a.y+a.h*.88;B.vx=B.vy=0;B.r=Math.max(12,Math.min(18,Math.min(W,H)*.032));B.inv=1.3}function place(r,all){let a=arena();for(let i=0;i<80;i++){let o={x:R(a.x+r+20,a.x+a.w-r-20),y:R(a.y+r+20,a.y+a.h-r-20),r};if(d(o.x,o.y,B.x,B.y)>70&&d(o.x,o.y,G.x,G.y)>70&&all.every(e=>d(o.x,o.y,e.x,e.y)>r+e.r+18))return o}return{x:R(60,W-60),y:R(120,H-60),r}}function level(n){S.lv=n;S.got=0;S.open=0;coins=[];bad=[];bum=[];bits=[];let a=arena(),all=[];G={x:a.x+a.w/2,y:a.y+a.h*.11,r:34};reset();let cc=Math.min(10+n,22),hc=Math.min(3+n,12),bc=Math.min(4+(n/2|0),9);S.need=Math.max(6,cc*.7|0);for(let i=0;i<bc;i++){let o=place(R(21,32),all);o.hit=0;bum.push(o);all.push(o)}for(let i=0;i<hc;i++){let o=place(R(16,24),all);o.ox=o.x;o.oy=o.y;o.a=R(0,7);o.s=R(.5,1.1)*(Math.random()<.5?-1:1);o.o=R(10,34);bad.push(o);all.push(o)}for(let i=0;i<cc;i++){let o=place(R(8,12),all);o.v=i%5?1:2;coins.push(o);all.push(o)}hud()}function pop(x,y,col,n=22){for(let i=0;i<n;i++){let a=R(0,6.283),s=R(60,330);bits.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:R(2,5),l:R(.35,.9),c:col})}}function add(v,x,y){S.sc+=v;if(S.sc>best){best=S.sc|0;localStorage.bpgBest=best}bits.push({x,y,vx:0,vy:-28,r:0,l:1,c:'white',text:'+'+v});hud()}function start(){S={mode:1,pause:0,lv:1,sc:0,life:3,got:0,need:7,open:0};m.classList.add('hide');level(1)}function over(){S.mode=0;m.classList.remove('hide');m.querySelector('h1').innerHTML='Game Over<br>Score '+(S.sc|0);m.querySelector('p').textContent='Best score: '+best+'. Tap start to play again.'}function step(dt){if(!S.mode||S.pause)return;B.inv=Math.max(0,B.inv-dt);bad.forEach(h=>{h.a+=h.s*dt;h.x=h.ox+Math.cos(h.a)*h.o;h.y=h.oy+Math.sin(h.a*1.3)*h.o});B.vx*=Math.pow(.991,dt*120);B.vy*=Math.pow(.991,dt*120);let sp=Math.hypot(B.vx,B.vy);if(sp>980){B.vx=B.vx/sp*980;B.vy=B.vy/sp*980}B.x+=B.vx*dt;B.y+=B.vy*dt;let a=arena();if(B.x-B.r<a.x){B.x=a.x+B.r;B.vx=Math.abs(B.vx)*.76}if(B.x+B.r>a.x+a.w){B.x=a.x+a.w-B.r;B.vx=-Math.abs(B.vx)*.76}if(B.y-B.r<a.y){B.y=a.y+B.r;B.vy=Math.abs(B.vy)*.76}if(B.y+B.r>a.y+a.h){B.y=a.y+a.h-B.r;B.vy=-Math.abs(B.vy)*.76}bum.forEach(b=>{b.hit=Math.max(0,b.hit-dt*5);let dx=B.x-b.x,dy=B.y-b.y,dd=Math.hypot(dx,dy)||1,md=B.r+b.r;if(dd<md){let nx=dx/dd,ny=dy/dd,dot=B.vx*nx+B.vy*ny;B.x=b.x+nx*md;B.y=b.y+ny*md;B.vx-=2*dot*nx;B.vy-=2*dot*ny;B.vx+=nx*350;B.vy+=ny*350;b.hit=1;add(35,b.x,b.y);pop(b.x,b.y,'#67c7ff',18)}});coins.forEach(o=>{if(o.dead)return;let dd=d(B.x,B.y,o.x,o.y);if(dd<85){o.x+=(B.x-o.x)/dd*.8;o.y+=(B.y-o.y)/dd*.8}if(dd<B.r+o.r+2){o.dead=1;S.got+=o.v;add(100+o.v*55,o.x,o.y);pop(o.x,o.y,'#67f5c1');if(!S.open&&S.got>=S.need){S.open=1;pop(G.x,G.y,'#b8fff0',60)}hud()}});if(B.inv<=0)bad.forEach(h=>{if(!h.dead&&d(B.x,B.y,h.x,h.y)<B.r+h.r){S.life--;pop(B.x,B.y,'#ff5c7c',60);hud();if(S.life<=0)over();else reset()}});if(S.open&&d(B.x,B.y,G.x,G.y)<B.r+G.r*.75){add(500+S.lv*120,G.x,G.y);pop(G.x,G.y,'#b8fff0',70);setTimeout(()=>S.mode&&level(S.lv+1),650)}bits.forEach(p=>{p.l-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985});bits=bits.filter(p=>p.l>0)}function ball(o,a,b,r=o.r){let gr=ctx.createRadialGradient(o.x-r*.4,o.y-r*.5,1,o.x,o.y,r*1.3);gr.addColorStop(0,'#fff');gr.addColorStop(.35,a);gr.addColorStop(1,b);ctx.fillStyle=gr;ctx.beginPath();ctx.arc(o.x,o.y,r,0,6.283);ctx.fill();ctx.strokeStyle='#ffffff99';ctx.stroke()}function draw(){ctx.setTransform(D,0,0,D,0,0);let bg=ctx.createRadialGradient(W*.5,H*.2,20,W*.5,H*.5,Math.max(W,H));bg.addColorStop(0,'#173c66');bg.addColorStop(.5,'#071526');bg.addColorStop(1,'#02050c');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#d8f2ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill()});ctx.globalAlpha=1;let a=arena();ctx.strokeStyle='#8bd8ff55';ctx.lineWidth=2;ctx.strokeRect(a.x,a.y,a.w,a.h);ctx.strokeStyle=S.open?'#67f5c1':'#4d6d88';for(let i=3;i;i--){ctx.globalAlpha=S.open?.16:.06;ctx.beginPath();ctx.arc(G.x,G.y,G.r+i*10,0,6.283);ctx.stroke()}ctx.globalAlpha=1;ctx.fillStyle=S.open?'#67f5c166':'#64788c44';ctx.beginPath();ctx.arc(G.x,G.y,G.r,0,6.283);ctx.fill();coins.forEach(o=>!o.dead&&ball(o,o.v>1?'#ffe08a':'#9dffd8',o.v>1?'#f9a73e':'#20c997'));bad.forEach(o=>ball(o,'#ff7b96','#c31545'));bum.forEach(o=>ball(o,'#67c7ff','#1b5daa',o.r+o.hit*8));ball(B,'#8de6ff','#1d6ce0',B.r);if(drag){let dx=drag.sx-drag.x,dy=drag.sy-drag.y,dd=Math.hypot(dx,dy)||1,ch=Math.min(1,dd/170);ctx.strokeStyle=ch>.75?'#ffd166':'#67f5c1';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(B.x,B.y);ctx.lineTo(B.x+dx/dd*(42+ch*130),B.y+dy/dd*(42+ch*130));ctx.stroke()}bits.forEach(p=>{ctx.globalAlpha=Math.max(0,p.l);if(p.text){ctx.fillStyle='white';ctx.font='800 14px system-ui';ctx.fillText(p.text,p.x,p.y)}else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.l,0,6.283);ctx.fill()}});ctx.globalAlpha=1;if(S.pause){ctx.fillStyle='#0008';ctx.fillRect(0,0,W,H);ctx.fillStyle='white';ctx.font='900 44px system-ui';ctx.textAlign='center';ctx.fillText('Paused',W/2,H/2)}}function loop(ms){t=ms;if(!last)last=ms;let dt=Math.min(.033,(ms-last)/1000);last=ms;for(let i=0;i<3;i++)step(dt/3);draw();requestAnimationFrame(loop)}function pnt(e){let r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}cv.addEventListener('pointerdown',e=>{if(!S.mode||S.pause)return;e.preventDefault();let p=pnt(e);drag={sx:p.x,sy:p.y,x:p.x,y:p.y};try{cv.setPointerCapture(e.pointerId)}catch(x){}});cv.addEventListener('pointermove',e=>{if(!drag)return;e.preventDefault();let p=pnt(e);drag.x=p.x;drag.y=p.y});cv.addEventListener('pointerup',e=>{if(!drag)return;e.preventDefault();let p=pnt(e);drag.x=p.x;drag.y=p.y;let dx=drag.sx-drag.x,dy=drag.sy-drag.y,dd=Math.hypot(dx,dy)||1;drag=null;if(dd<12)return;let pw=360+Math.min(1,dd/170)*720;B.vx+=dx/dd*pw;B.vy+=dy/dd*pw;pop(B.x,B.y,'#67c7ff',18)});st.onclick=start;re.onclick=()=>S.mode&&start();pa.onclick=()=>{if(!S.mode)return;S.pause=!S.pause;pa.textContent=S.pause?'Resume':'Pause'};addEventListener('resize',size,{passive:1});addEventListener('orientationchange',()=>setTimeout(size,120),{passive:1});size();hud();requestAnimationFrame(loop)})();</script></body></html>
